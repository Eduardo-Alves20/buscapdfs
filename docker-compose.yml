services:
  postgres:
    image: postgres:16-alpine
    container_name: buscapdfs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: buscapdfs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - buscapdfs_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d buscapdfs"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s

volumes:
  buscapdfs_pgdata:
